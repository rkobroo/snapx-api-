<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.06);border-radius:16px;padding:32px;width:100%;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
h1{text-align:center;font-size:22px;margin-bottom:4px}
.sub{text-align:center;color:#788;font-size:13px;margin-bottom:24px}
.row{display:flex;gap:8px}
input{flex:1;padding:12px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.3);color:#fff;font-size:14px;outline:0}
input:focus{border-color:#4a9eff}
button{padding:12px 20px;border-radius:8px;border:0;background:#4a9eff;color:#fff;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap}
button:disabled{opacity:.5;cursor:not-allowed}
.loading{text-align:center;margin-top:20px;display:none}
.loading.show{display:block}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,.15);border-top-color:#4a9eff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.video-wrap{margin-top:12px;display:none}
.video-wrap.show{display:block}
.video-wrap video{width:100%;border-radius:10px}
.meta{margin-top:8px;padding:12px;background:rgba(0,0,0,.25);border-radius:8px;display:none}
.meta.show{display:block}
.meta .title{font-size:14px;line-height:1.5;color:#ccc}
.dl-wrap{margin-top:14px}
.dl-wrap a{text-decoration:none}
.dl-wrap button{width:100%;background:linear-gradient(135deg,#22c55e,#16a34a);font-size:15px;padding:14px}
.error{color:#f87171;font-size:13px;margin-top:12px;text-align:center;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="card">
<h1>Video Downloader</h1>
<p class="sub">YouTube · TikTok · Facebook · Instagram · Twitter</p>
<div class="row">
<input type="url" id="url" placeholder="Paste video link here..." autofocus>
<button id="go" onclick="load()">Load</button>
</div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="meta" id="meta"><div class="title" id="label"></div></div>
<div class="video-wrap" id="videoWrap"><video id="video" controls></video></div>
<div class="dl-wrap"><a id="dlLink" target="_blank" rel="noopener"><button>Download</button></a></div>
<div class="error" id="errMsg"></div>
</div>
<script>
const $=(id)=>document.getElementById(id);
const input=$('url'),go=$('go'),loading=$('loading');
const meta=$('meta'),label=$('label'),videoWrap=$('videoWrap'),video=$('video');
const dlLink=$('dlLink'),errMsg=$('errMsg');

async function load(){
  const url=input.value.trim();
  if(!url)return;
  go.disabled=true;loading.classList.add('show');
  videoWrap.classList.remove('show');video.src='';
  meta.classList.remove('show');errMsg.classList.remove('show');
  try{
    const r=await fetch('/api/download-video?url='+encodeURIComponent(url));
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    label.textContent=d.title||'';
    if(d.title)meta.classList.add('show');
    if(d.result){video.src=d.result;videoWrap.classList.add('show')}
    const dlName=d.title||'video';
    dlLink.href='/api/download-video?mode=download&url='+encodeURIComponent(d.result)+'&name='+encodeURIComponent(dlName);
  }catch(e){errMsg.textContent=e.message;errMsg.classList.add('show')}
  finally{go.disabled=false;loading.classList.remove('show')}
}
input.addEventListener('keydown',e=>e.key==='Enter'&&load());
</script>
</body>
</html>
