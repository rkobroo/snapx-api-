<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Downloader</title>
  <link rel="icon" type="image/png" href="/logo2.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 32px; width: 100%; max-width: 540px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    h1 { text-align: center; font-size: 24px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #8899aa; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #aab; margin-bottom: 6px; }
    input, button { width: 100%; padding: 12px 16px; border-radius: 8px; font-size: 15px; }
    input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #4a9eff; }
    button { background: linear-gradient(135deg, #4a9eff, #3a8eef); color: #fff; border: none; cursor: pointer; font-weight: 600; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 16px; background: rgba(0,0,0,0.3); border-radius: 8px; display: none; word-break: break-all; }
    .result.show { display: block; }
    .result a { color: #4a9eff; }
    .error { color: #ff6b6b; margin-top: 12px; display: none; }
    .error.show { display: block; }
    .loading { text-align: center; margin-top: 16px; display: none; }
    .loading.show { display: block; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info { font-size: 13px; color: #8899aa; margin-top: 16px; text-align: center; }
    .info span { display: inline-block; margin: 0 6px; color: #4a9eff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Video Downloader</h1>
    <p class="subtitle">YouTube ┬╖ TikTok ┬╖ Facebook ┬╖ Instagram ┬╖ Twitter</p>
    <label for="url">Paste video URL:</label>
    <input type="url" id="url" placeholder="https://youtube.com/watch?v=..." autofocus>
    <button id="dlBtn" onclick="download()">Download</button>
    <div class="loading" id="loading"><div class="spinner"></div></div>
    <div class="error" id="error"></div>
    <div class="result" id="result">
      <div id="titleArea" style="margin-top:8px;font-size:14px"></div>
      <video id="videoPreview" style="width:100%;margin-top:10px;border-radius:8px;display:none" controls poster="">
        Your browser does not support video playback.
      </video>
      <div style="margin-top:12px"><a id="dlLink" target="_blank" rel="noopener"><button style="background:linear-gradient(135deg,#28a745,#209139)">Download Video</button></a></div>
    </div>
  </div>
  <script>
    async function download() {
      const url = document.getElementById('url').value.trim();
      if (!url) return;
      const btn = document.getElementById('dlBtn');
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      error.classList.remove('show');
      result.classList.remove('show');
      btn.disabled = true;
      loading.classList.add('show');
      try {
        const resp = await fetch('/api/download-video?url=' + encodeURIComponent(url));
        const data = await resp.json();
        if (data.error) throw new Error(data.error);
        document.getElementById('dlLink').href = data.result;
        document.getElementById('titleArea').textContent = data.title || '';
        const vp = document.getElementById('videoPreview');
        vp.src = data.result;
        vp.poster = data.preview || '';
        vp.style.display = 'block';
        result.classList.add('show');
      } catch (e) {
        error.textContent = e.message;
        error.classList.add('show');
      } finally {
        btn.disabled = false;
        loading.classList.remove('show');
      }
    }
    document.getElementById('url').addEventListener('keydown', e => { if (e.key === 'Enter') download(); });
  </script>
</body>
</html>
